<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB ข่าวราชการเชียงใหม่</title>
    <!-- ใช้งาน Tailwind CSS ผ่าน CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้งาน Icon จาก Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- กำหนด Font ภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .line-clamp-5 {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm relative">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="bg-indigo-600 p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-white">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </div>
                <h1 class="text-sm sm:text-lg font-bold tracking-tight">HUB <span class="text-indigo-600 hidden sm:inline">ข่าวราชการเชียงใหม่</span><span class="text-indigo-600 sm:hidden">เชียงใหม่</span></h1>
            </div>
            <div class="flex items-center gap-1.5 sm:gap-2">
                <select id="fetchLimitSelect" onchange="changeFetchLimit(this.value)" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg sm:rounded-xl text-[10px] sm:text-sm font-bold focus:outline-none shadow-sm cursor-pointer transition-all">
                    <option value="10">10 ข่าว</option>
                    <option value="20">20 ข่าว</option>
                    <option value="30">30 ข่าว</option>
                </select>
                <button onclick="openAddModal()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg sm:rounded-xl text-[10px] sm:text-sm font-bold flex items-center gap-1 sm:gap-2 transition-all shadow-sm">
                    <i data-lucide="plus" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i> <span class="hidden sm:inline">เพิ่มเพจ</span>
                </button>
                <button id="refreshBtn" onclick="fetchNewsData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl text-[10px] sm:text-sm font-bold flex items-center gap-1 sm:gap-2 transition-all shadow-md">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5 sm:w-4 sm:h-4" id="refreshIcon"></i> <span id="refreshText" class="hidden sm:inline">รีเฟรช</span>
                </button>
            </div>
        </div>
        <!-- แถบ Progress Bar -->
        <div id="progressBarContainer" class="hidden absolute bottom-0 left-0 w-full h-1 bg-slate-100 overflow-hidden">
            <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-300 w-0"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6 grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-8 w-full flex-1">
        
        <!-- Sidebar -->
        <aside class="lg:col-span-3 space-y-4">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col relative lg:sticky lg:top-24 h-[35vh] lg:h-auto lg:max-h-[calc(100vh-6rem)] overflow-hidden">
                <div class="p-3 sm:p-4 border-b border-slate-100 space-y-3 shrink-0">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400"></i>
                        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ค้นหาหน่วยงาน..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/20 outline-none">
                    </div>
                    <div class="flex flex-wrap gap-1" id="filterContainer">
                        <!-- Filters Rendered Here -->
                    </div>
                </div>
                
                <div class="overflow-y-auto p-2 space-y-1 custom-scrollbar flex-1" id="pagesList">
                    <!-- Pages Rendered Here -->
                </div>

                <div class="p-2 sm:p-3 bg-slate-50 border-t border-slate-100 flex justify-center shrink-0">
                    <button onclick="resetToDefault()" class="text-[10px] font-bold text-slate-400 hover:text-red-500 flex items-center gap-1.5 transition-colors">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> คืนค่าเริ่มต้น
                    </button>
                </div>
            </div>
        </aside>

        <!-- Feed -->
        <main class="lg:col-span-9 space-y-4 sm:space-y-6">
            <div id="postsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
                <!-- Posts Rendered Here -->
            </div>
            <div id="loadingState" class="hidden col-span-full flex-col items-center justify-center py-10 sm:py-20 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                <i data-lucide="loader-2" class="w-10 h-10 sm:w-12 sm:h-12 mb-3 animate-spin opacity-50"></i>
                <p class="text-xs sm:text-sm font-medium">กำลังโหลดข่าวสารล่าสุด...</p>
            </div>
            <div id="emptyState" class="hidden col-span-full flex-col items-center justify-center py-10 sm:py-20 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                <i data-lucide="alert-circle" class="w-10 h-10 sm:w-12 sm:h-12 mb-3 opacity-20"></i>
                <p class="text-xs sm:text-sm font-medium">ไม่พบข้อมูลในขณะนี้ กรุณารีเฟรชหรือรอสักครู่</p>
            </div>
        </main>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeAddModal()"></div>
        <div class="bg-white rounded-3xl w-full max-w-md p-8 relative shadow-2xl border border-slate-100 z-10">
            <h3 class="text-xl font-bold text-slate-800 mb-2">ตั้งค่าแหล่งข้อมูล</h3>
            <p class="text-slate-500 text-xs mb-6">จัดการชื่อหน่วยงานและลิงก์ XML RSS (.xml)</p>
            <form onsubmit="handleAddPage(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">ชื่อหน่วยงาน</label>
                    <input type="text" id="addName" required placeholder="เช่น สำนักงานจราจรเชียงใหม่" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">ประเภทหน่วยงาน</label>
                    <select id="addType" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none">
                        <option value="General">ทั่วไป (General)</option>
                        <option value="PR">ประชาสัมพันธ์ (PR)</option>
                        <option value="Government">ราชการ (Government)</option>
                        <option value="Police">ตำรวจ (Police)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">RSS URL (.xml)</label>
                    <input type="url" id="addRss" required placeholder="https://rss.app/feeds/..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none">
                </div>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeAddModal()" class="flex-1 text-slate-500 font-bold py-3 text-sm">ยกเลิก</button>
                    <button type="submit" class="flex-[2] bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // 1. ข้อมูลตั้งต้น (อัปเดตชื่อและลิงก์ให้ตรงกับรูปภาพ rss.app เป๊ะๆ)
        const defaultPages = [
            // อัปเดตลิงก์ตำรวจภูธรภาค 5 ใหม่เรียบร้อยแล้วครับ
            { id: '1', name: 'ตำรวจภูธรภาค 5', url: 'https://www.facebook.com/Police5Thailand/', rssUrl: 'https://rss.app/feeds/7QcxeY3w0trDdzDu.xml', type: 'Police', color: 'bg-red-100 text-red-700' },
            { id: '2', name: 'เทศบาลนครเชียงใหม่', url: 'https://www.facebook.com/cmmayor', rssUrl: 'https://rss.app/feeds/BDsDerwS4BhL0ExL.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '3', name: 'PR Chiangmai', url: 'https://www.facebook.com/chiangmaipr', rssUrl: 'https://rss.app/feeds/ZqCJu7HKiR7jas3R.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            { id: '4', name: 'คณะแพทยศาสตร์ มช.', url: 'https://www.facebook.com/medcmuth', rssUrl: 'https://rss.app/feeds/INGRSaq39enCJvxF.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '5', name: 'สวท.เชียงใหม่ PRD.', url: 'https://www.facebook.com/chiangmairadiothailand', rssUrl: 'https://rss.app/feeds/3N0vcMBX7RGIF4Zg.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            { id: '6', name: 'องค์การบริหารส่วนจังหวัดเชียงใหม่', url: 'https://www.facebook.com/cmpao888', rssUrl: 'https://rss.app/feeds/e9pwhxM6rcb1rIjO.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '7', name: 'สำนักงานประชาสัมพันธ์จังหวัดเชียงใหม่', url: 'https://www.facebook.com/PRDChiangMai', rssUrl: 'https://rss.app/feeds/MlZ6fjDnqWBBk70A.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            { id: '8', name: 'สำนักศิลปากรที่ ๗ เชียงใหม่', url: 'https://www.facebook.com/finearts7chiangmai', rssUrl: 'https://rss.app/feeds/VzDXL8wh9CF1NIQD.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '9', name: 'ศูนย์ประชาสัมพันธ์ร่วมเชียงใหม่', url: 'https://www.facebook.com/JICChiangMai', rssUrl: 'https://rss.app/feeds/HMSaKJsoJQDZTVEY.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            // สลับกลับมาเป็นสิ่งแวดล้อมให้ตรงกับ ID ในรูปของคุณ
            { id: '10', name: 'สำนักงานสิ่งแวดล้อมและควบคุมมลพิษที่ 1', url: 'https://www.facebook.com/profile.php?id=100064666933216', rssUrl: 'https://rss.app/feeds/XbBpNpdy2abueUo0.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            // เปลี่ยนชื่อให้ตรงกับในรูป
            { id: '11', name: 'ตำรวจท่องเที่ยวเชียงใหม่', url: 'https://www.facebook.com/tpdchiangmai221', rssUrl: 'https://rss.app/feeds/yxTX1YfXaoDAqldY.xml', type: 'Police', color: 'bg-red-100 text-red-700' },
            { id: '12', name: 'กองบิน 41 เพื่อประชาชน', url: 'https://www.facebook.com/wing41royalthaiairforce', rssUrl: 'https://rss.app/feeds/akPMfJtCeBXla8Ik.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '13', name: 'ตม. เชียงใหม่ (Immigration)', url: 'https://www.facebook.com/immchiangmai', rssUrl: 'https://rss.app/feeds/Nrkkg0BODlkm6IZE.xml', type: 'Police', color: 'bg-red-100 text-red-700' },
            { id: '14', name: 'สถานีตำรวจภูธรเมืองเชียงใหม่', url: 'https://www.facebook.com/muangchiangmaipolice', rssUrl: 'https://rss.app/feeds/N1YpMEAre776REFb.xml', type: 'Police', color: 'bg-red-100 text-red-700' },
            { id: '15', name: 'ศูนย์อุตุนิยมวิทยาภาคเหนือ', url: 'https://www.facebook.com/NorthCmmet', rssUrl: 'https://rss.app/feeds/esEH5XNvkhQrLaBV.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            { id: '16', name: 'สนง.ป้องกันและบรรเทาสาธารณภัย ชม.', url: 'https://www.facebook.com/cmdisaster', rssUrl: 'https://rss.app/feeds/g6iKtFW8PH3UvRgm.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '17', name: 'ท่าอากาศยานเชียงใหม่ (CNX)', url: 'https://www.facebook.com/chiangmaiairport', rssUrl: 'https://rss.app/feeds/fUY6EBMuwWUfXNel.xml', type: 'PR', color: 'bg-green-100 text-green-700' },
            { id: '18', name: 'ศูนย์ชั่งตวงวัดภาคเหนือ', url: 'https://www.facebook.com/NWMC.THAI', rssUrl: 'https://rss.app/feeds/z9RxEAmev0wyphOx.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' },
            { id: '19', name: 'สถานีตำรวจภูธรแม่ปิง', url: 'https://www.facebook.com/maepingpolice', rssUrl: 'https://rss.app/feeds/wVRjca9Wit8AaUvu.xml', type: 'Police', color: 'bg-red-100 text-red-700' },
            { id: '20', name: 'กองกำลังผาเมือง/กอ.รมน. ภาค 3', url: 'https://www.facebook.com/profile.php?id=100068648581836', rssUrl: 'https://rss.app/feeds/qmNTJdxnp0bAVAu8.xml', type: 'Government', color: 'bg-blue-100 text-blue-700' }
        ];

        // 2. State & Storage (อัปเดตเป็น v13 เพื่อรับค่าลิงก์ใหม่ของตำรวจภาค 5)
        let pages = JSON.parse(localStorage.getItem('cmNewsPagesHTML_v13')) || defaultPages;
        let readPosts = JSON.parse(localStorage.getItem('cmNewsReadPostsHTML_v13')) || [];
        let fetchLimit = parseInt(localStorage.getItem('cmNewsFetchLimitHTML')) || 10;
        let cachedFeeds = JSON.parse(localStorage.getItem('cmNewsCachedFeedsHTML_v13')) || {}; 
        let allFetchedPosts = [];
        let filterType = 'All';
        let searchTerm = '';
        let selectedPageId = null;
        let isLoading = false;

        function savePages() { localStorage.setItem('cmNewsPagesHTML_v13', JSON.stringify(pages)); }
        function saveReadPosts() { localStorage.setItem('cmNewsReadPostsHTML_v13', JSON.stringify(readPosts)); }

        // ล้างความจำเก่าทั้งหมด
        localStorage.removeItem('cmNewsPagesHTML_v11');
        localStorage.removeItem('cmNewsReadPostsHTML_v11');
        localStorage.removeItem('cmNewsCachedFeedsHTML_v11');
        localStorage.removeItem('cmNewsPagesHTML_v12');
        localStorage.removeItem('cmNewsReadPostsHTML_v12');
        localStorage.removeItem('cmNewsCachedFeedsHTML_v12');

        // 3. UI Rendering
        function getTimeAgo(timestamp) {
            if (!timestamp) return 'ยังไม่มีข้อมูล';
            const seconds = Math.floor((new Date() - timestamp) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " ปีที่แล้ว";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " เดือนที่แล้ว";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " วันที่แล้ว";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " ชม.ที่แล้ว";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " นาทีที่แล้ว";
            return "เพิ่งอัปเดต";
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            const types = ['All', 'Police', 'Government', 'PR'];
            container.innerHTML = types.map(type => `
                <button onclick="setFilter('${type}')" class="text-[9px] px-2 py-1 rounded font-bold transition-all ${filterType === type ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
                    ${type === 'All' ? 'ทั้งหมด' : type}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderSidebar() {
            const container = document.getElementById('pagesList');
            document.getElementById('searchInput').placeholder = `ค้นหาจาก ${pages.length} หน่วยงาน...`;
            
            const filteredPages = pages.filter(p => 
                p.name.toLowerCase().includes(searchTerm.toLowerCase()) && 
                (filterType === 'All' || p.type === filterType)
            );

            container.innerHTML = filteredPages.map(page => {
                let latestUpdateText = 'ยังไม่มีข้อมูล';
                let isRecent = false;

                if (cachedFeeds[page.id] && cachedFeeds[page.id].length > 0) {
                    const latestPost = cachedFeeds[page.id].reduce((prev, current) => (prev.timestamp > current.timestamp) ? prev : current);
                    latestUpdateText = getTimeAgo(latestPost.timestamp);
                    const hoursAgo = (new Date() - latestPost.timestamp) / (1000 * 60 * 60);
                    if (hoursAgo <= 24) isRecent = true;
                }

                return `
                <div onclick="togglePageSelect('${page.id}')" class="group flex items-center justify-between p-2.5 rounded-xl transition-all border cursor-pointer ${selectedPageId === page.id ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'border-transparent hover:bg-indigo-50/50'}">
                    <div class="min-w-0 flex-1">
                        <p class="text-[11px] font-bold truncate leading-tight ${selectedPageId === page.id ? 'text-indigo-700' : 'text-slate-800'}">${page.name}</p>
                        <div class="flex items-center gap-1.5 mt-1.5">
                            <span class="text-[8px] px-1.5 py-0.5 rounded font-black uppercase ${page.color}">${page.type}</span>
                            <span class="text-[9px] ${isRecent ? 'text-emerald-600 font-bold' : 'text-slate-400'} flex items-center gap-1">
                                ${isRecent ? '<div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-sm shadow-emerald-200"></div>' : ''}
                                ${latestUpdateText}
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="deletePage(event, '${page.id}')" class="p-1.5 text-slate-300 hover:text-red-500 transition-colors" title="ลบเพจ">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderPosts() {
            const container = document.getElementById('postsGrid');
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');

            let displayPosts = allFetchedPosts.filter(post => filterType === 'All' || post.type === filterType);
            
            if (selectedPageId) {
                const selectedPage = pages.find(p => p.id === selectedPageId);
                if (selectedPage) {
                    displayPosts = displayPosts.filter(post => 
                        post.source === selectedPage.name || 
                        (post.sharedBy && post.sharedBy.some(s => s.name === selectedPage.name))
                    );
                }
            }

            emptyState.classList.add('hidden');
            emptyState.style.display = 'none';
            loadingState.classList.add('hidden');
            loadingState.style.display = 'none';

            if (displayPosts.length === 0) {
                container.innerHTML = '';
                if (isLoading) {
                    loadingState.classList.remove('hidden');
                    loadingState.style.display = 'flex';
                } else {
                    emptyState.classList.remove('hidden');
                    emptyState.style.display = 'flex';
                }
                return;
            }

            container.innerHTML = displayPosts.map(post => {
                const isRead = readPosts.includes(post.id);
                return `
                <article class="bg-white rounded-2xl sm:rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all flex flex-col h-full group ${isRead ? 'opacity-70 bg-slate-50' : ''}">
                    <div class="relative aspect-[16/10] overflow-hidden bg-slate-100">
                        <img src="${post.image}" alt="" onerror="this.src='https://images.unsplash.com/photo-1590402444723-6447816f1c7d?auto=format&fit=crop&q=80&w=800'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ${isRead ? 'grayscale-[40%]' : ''}" />
                        ${isRead ? `
                        <div class="absolute top-2 right-2 sm:top-3 sm:right-3 bg-slate-900/60 backdrop-blur-sm text-white text-[9px] sm:text-[10px] px-2 py-1 sm:px-2.5 sm:py-1 rounded-full flex items-center gap-1.5 font-bold shadow-sm">
                            <i data-lucide="check-circle" class="w-3 h-3"></i> อ่านแล้ว
                        </div>` : ''}
                    </div>
                    <div class="p-4 sm:p-5 flex flex-col flex-1">
                        <div class="flex items-start justify-between mb-3 sm:mb-4">
                            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-indigo-50 flex items-center justify-center font-bold text-[11px] sm:text-[12px] text-indigo-600 border border-indigo-100 shrink-0">
                                    ${post.source.charAt(0)}
                                </div>
                                <div class="flex flex-col min-w-0">
                                    <p class="text-[11px] sm:text-xs font-bold text-slate-800 truncate leading-tight">
                                        ${post.source}
                                        ${post.sharedBy && post.sharedBy.length > 0 ? `<span class="text-slate-400 font-medium ml-1 text-[9px] sm:text-[10px]">(+${post.sharedBy.length} เพจ)</span>` : ''}
                                    </p>
                                    <p class="text-[9px] sm:text-[10px] text-slate-500 font-medium mt-0.5">${post.time}</p>
                                </div>
                            </div>
                            <span class="px-1.5 py-0.5 sm:px-2 sm:py-1 rounded text-[8px] sm:text-[9px] font-black uppercase tracking-wider shrink-0 ${
                                post.type === 'Police' ? 'bg-red-50 text-red-600' : 
                                post.type === 'Government' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'
                            }">${post.type}</span>
                        </div>
                        <p class="text-[12px] sm:text-[13.5px] leading-relaxed whitespace-pre-line line-clamp-5 mb-4 sm:mb-5 flex-1 transition-colors ${isRead ? 'text-slate-500' : 'text-slate-700 group-hover:text-slate-900'}">
                            ${post.content}
                        </p>
                        <div class="pt-3 sm:pt-4 border-t border-slate-100 flex flex-col gap-2">
                            <div class="flex items-center justify-between">
                                <a href="${post.sourceUrl}" target="_blank" onclick="${!isRead ? `toggleReadStatus('${post.id}')` : ''}" class="text-indigo-600 px-2 py-1.5 sm:px-3 sm:py-1.5 rounded-lg text-[10px] sm:text-[11px] font-bold hover:bg-indigo-50 transition-colors flex items-center gap-1.5 -ml-2 uppercase tracking-tight">
                                    ดูต้นฉบับ <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                                <div class="flex items-center gap-1">
                                    <button onclick="toggleReadStatus('${post.id}')" class="p-1 sm:p-1.5 transition-colors rounded-lg flex items-center gap-1 text-[9px] sm:text-[10px] font-bold ${isRead ? 'text-emerald-600 bg-emerald-50 hover:bg-emerald-100' : 'text-slate-400 bg-slate-50 hover:bg-slate-100 hover:text-slate-600'}" title="${isRead ? 'ทำเครื่องหมายว่ายังไม่อ่าน' : 'ทำเครื่องหมายว่าอ่านแล้ว'}">
                                        <i data-lucide="check-circle" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                                    </button>
                                    ${post.isLive ? `
                                    <span class="text-[8px] sm:text-[9px] text-emerald-600 font-bold bg-emerald-50 px-1.5 py-1 sm:px-2 sm:py-1 rounded-full flex items-center gap-1 sm:gap-1.5">
                                        <span class="w-1 h-1 sm:w-1.5 sm:h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> สด
                                    </span>` : ''}
                                </div>
                            </div>
                            ${post.sharedBy && post.sharedBy.length > 0 ? `
                            <div class="flex flex-wrap gap-1 mt-1 items-center">
                                <span class="text-[8px] sm:text-[9px] text-slate-400 font-medium py-1">แชร์ร่วมกับ:</span>
                                ${post.sharedBy.map(shared => `
                                    <a href="${shared.url}" target="_blank" class="text-[8px] sm:text-[9px] text-slate-500 bg-slate-100 hover:bg-slate-200 px-1.5 py-0.5 sm:px-2 sm:py-1 rounded transition-colors truncate max-w-[100px] sm:max-w-[120px]">${shared.name}</a>
                                `).join('')}
                            </div>` : ''}
                        </div>
                    </div>
                </article>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function processPosts(rawPosts) {
            const mergedPostsMap = new Map();
            rawPosts.forEach(post => {
                const matchText = (post.content || '').replace(/\s+/g, '').substring(0, 60);
                const key = matchText.length > 20 ? matchText : post.id;

                if (mergedPostsMap.has(key)) {
                    const existingPost = mergedPostsMap.get(key);
                    existingPost.sharedBy = existingPost.sharedBy || [];
                    if (existingPost.source !== post.source && !existingPost.sharedBy.some(s => s.name === post.source)) {
                        existingPost.sharedBy.push({ name: post.source, url: post.sourceUrl });
                    }
                    if (post.timestamp > existingPost.timestamp) {
                        existingPost.timestamp = post.timestamp;
                        existingPost.time = post.time;
                    }
                } else {
                    mergedPostsMap.set(key, { ...post, sharedBy: [] });
                }
            });

            allFetchedPosts = Array.from(mergedPostsMap.values()).sort((a, b) => b.timestamp - a.timestamp);
            renderPosts();
        }

        function parseXmlItems(xmlText, page) {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                if (xmlDoc.querySelector("parsererror")) return null;

                const items = Array.from(xmlDoc.querySelectorAll("item, entry"));
                if (items.length === 0) return null;

                return items.slice(0, fetchLimit).map(item => {
                    const title = item.querySelector("title")?.textContent || "";
                    
                    let link = item.querySelector("link")?.textContent;
                    if (!link && item.querySelector("link[href]")) {
                        link = item.querySelector("link").getAttribute("href");
                    }
                    link = link || page.url;
                    
                    let description = item.querySelector("description")?.textContent || item.querySelector("summary")?.textContent || "";
                    const contentEncoded = item.getElementsByTagNameNS("*", "encoded")?.[0]?.textContent || item.querySelector("content")?.textContent;
                    if (contentEncoded) description = contentEncoded;

                    const pubDate = item.querySelector("pubDate")?.textContent || item.querySelector("published")?.textContent || item.querySelector("updated")?.textContent;
                    
                    let thumbnail = item.querySelector("enclosure")?.getAttribute("url") || 
                                    item.getElementsByTagNameNS("*", "content")?.[0]?.getAttribute("url");
                    
                    if (!thumbnail && description) {
                        const imgMatch = description.match(/<img[^>]+src="([^">]+)"/);
                        if (imgMatch) thumbnail = imgMatch[1];
                    }
                    
                    let htmlContent = description.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n\n');
                    let cleanContent = htmlContent.replace(/<[^>]+>/g, '').trim().replace(/\n{3,}/g, '\n\n');
                    
                    let fullText = cleanContent.length > title.length ? cleanContent : title;
                    const displayContent = fullText.length > 1000 ? fullText.substring(0, 1000) + '...' : fullText;
                    
                    const parsedDate = pubDate ? new Date(pubDate) : new Date();
                    const displayTime = parsedDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' น.';
                    
                    return {
                        id: item.querySelector("guid")?.textContent || item.querySelector("id")?.textContent || link + Math.random(),
                        source: page.name, sourceUrl: link, type: page.type, content: displayContent,
                        image: thumbnail || 'https://images.unsplash.com/photo-1590402444723-6447816f1c7d?auto=format&fit=crop&q=80&w=800',
                        time: displayTime, timestamp: parsedDate.getTime(), isLive: true
                    };
                });
            } catch(e) { return null; }
        }

        async function fetchNewsData() {
            isLoading = true;
            
            const hasCache = Object.keys(cachedFeeds).length > 0;
            if (hasCache) {
                processPosts(Object.values(cachedFeeds).flat());
            } else {
                renderPosts();
            }

            document.getElementById('refreshIcon').classList.add('animate-spin');
            document.getElementById('refreshText').innerText = 'กำลังเริ่ม...';
            
            document.getElementById('progressBarContainer').classList.remove('hidden');
            document.getElementById('progressBar').style.width = '0%';

            const delay = ms => new Promise(res => setTimeout(res, ms));

            async function fetchWithTimeout(url, timeout = 7000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(id);
                    return response;
                } catch (error) {
                    clearTimeout(id);
                    throw error;
                }
            }

            const batchSize = 3; 
            let completedCount = 0; 
            const hourCacheBuster = Math.floor(Date.now() / 3600000);

            const processPage = async (page) => {
                try {
                    if (!page.rssUrl || page.rssUrl === '#') return;
                    
                    const refreshUrl = page.rssUrl + (page.rssUrl.includes('?') ? '&' : '?') + 'h=' + hourCacheBuster;
                    const targetUrl = encodeURIComponent(refreshUrl);
                    let parsedItems = null;

                    try {
                        const r2jRes = await fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${targetUrl}`, 6000);
                        if (r2jRes.ok) {
                            const data = await r2jRes.json();
                            if (data.status === 'ok' && data.items && data.items.length > 0) {
                                parsedItems = data.items.slice(0, fetchLimit).map(item => {
                                    const parsedDate = item.pubDate ? new Date(item.pubDate) : new Date();
                                    let thumb = item.thumbnail || item.enclosure?.link;
                                    if (!thumb && item.description) {
                                        const imgMatch = item.description.match(/<img[^>]+src="([^">]+)"/);
                                        if (imgMatch) thumb = imgMatch[1];
                                    }
                                    let htmlContent = item.description || item.content || "";
                                    htmlContent = htmlContent.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n\n');
                                    let cleanContent = htmlContent.replace(/<[^>]+>/g, '').trim().replace(/\n{3,}/g, '\n\n');
                                    const title = item.title || "";
                                    let fullText = cleanContent.length > title.length ? cleanContent : title;
                                    const content = fullText.length > 1000 ? fullText.substring(0, 1000) + '...' : fullText;
                                    const displayTime = parsedDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' น.';
                                    
                                    return {
                                        id: item.guid || item.link, source: page.name, sourceUrl: item.link, type: page.type, content: content,
                                        image: thumb || 'https://images.unsplash.com/photo-1590402444723-6447816f1c7d?auto=format&fit=crop&q=80&w=800',
                                        time: displayTime, timestamp: parsedDate.getTime(), isLive: true
                                    };
                                });
                            }
                        }
                    } catch (e) {}

                    if (!parsedItems || parsedItems.length === 0) {
                        const fallbacks = [
                            `https://api.allorigins.win/get?url=${targetUrl}`,
                            `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`,
                            `https://corsproxy.io/?${targetUrl}`
                        ];
                        
                        for (const fb of fallbacks) {
                            try {
                                const res = await fetchWithTimeout(fb, 6000);
                                if (res.ok) {
                                    if (fb.includes('allorigins.win')) {
                                        const aoData = await res.json();
                                        if (aoData.contents) parsedItems = parseXmlItems(aoData.contents, page);
                                    } else {
                                        const xmlText = await res.text();
                                        parsedItems = parseXmlItems(xmlText, page);
                                    }
                                    if (parsedItems && parsedItems.length > 0) break;
                                }
                            } catch (e) {}
                        }
                    }

                    if (parsedItems && parsedItems.length > 0) {
                        cachedFeeds[page.id] = parsedItems;
                        localStorage.setItem('cmNewsCachedFeedsHTML_v12', JSON.stringify(cachedFeeds));
                        processPosts(Object.values(cachedFeeds).flat());
                        renderSidebar();
                    }
                } catch (error) {
                } finally {
                    completedCount++;
                    const percent = Math.round((completedCount / pages.length) * 100);
                    document.getElementById('progressBar').style.width = percent + '%';
                    document.getElementById('refreshText').innerText = `โหลด ${percent}%`;
                }
            };

            try {
                for (let i = 0; i < pages.length; i += batchSize) {
                    const batch = pages.slice(i, i + batchSize);
                    await Promise.all(batch.map(page => processPage(page)));
                    if (i + batchSize < pages.length) {
                        await delay(1500); 
                    }
                }
            } finally {
                isLoading = false;
                
                setTimeout(() => {
                    document.getElementById('refreshIcon').classList.remove('animate-spin');
                    document.getElementById('refreshText').innerText = 'รีเฟรช';
                    document.getElementById('progressBarContainer').classList.add('hidden');
                    document.getElementById('progressBar').style.width = '0%';
                }, 800);

                renderPosts();
                renderSidebar();
            }
        }

        function changeFetchLimit(value) {
            fetchLimit = parseInt(value);
            localStorage.setItem('cmNewsFetchLimitHTML', fetchLimit);
            fetchNewsData(); 
        }

        function setFilter(type) {
            filterType = type;
            selectedPageId = null;
            renderFilters();
            renderSidebar();
            renderPosts();
        }

        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value;
            renderSidebar();
        }

        function togglePageSelect(id) {
            selectedPageId = selectedPageId === id ? null : id;
            renderSidebar();
            renderPosts();
        }

        function toggleReadStatus(postId) {
            if (readPosts.includes(postId)) {
                readPosts = readPosts.filter(id => id !== postId);
            } else {
                readPosts.push(postId);
            }
            saveReadPosts();
            renderPosts();
        }

        function deletePage(e, id) {
            e.stopPropagation();
            if(window.confirm('คุณต้องการลบแหล่งข้อมูลนี้ใช่หรือไม่?')) {
                pages = pages.filter(p => p.id !== id);
                if (selectedPageId === id) selectedPageId = null;
                savePages();
                renderSidebar();
                fetchNewsData(); 
            }
        }

        function resetToDefault() {
            if(window.confirm('คุณต้องการล้างข้อมูลเพจทั้งหมดที่เพิ่มเอง และกลับไปใช้ 20 เพจเริ่มต้นใช่หรือไม่?')) {
                pages = [...defaultPages];
                savePages();
                renderSidebar();
                fetchNewsData();
            }
        }

        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModal').classList.add('flex');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addModal').classList.remove('flex');
            document.getElementById('addName').value = '';
            document.getElementById('addRss').value = '';
        }

        function handleAddPage(e) {
            e.preventDefault();
            const name = document.getElementById('addName').value;
            const type = document.getElementById('addType').value;
            const rssUrl = document.getElementById('addRss').value;
            
            if (name && rssUrl) {
                const id = Date.now().toString();
                const color = type === 'Police' ? 'bg-red-100 text-red-700' : 
                             type === 'Government' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700';
                
                pages.push({ id, name, url: rssUrl, rssUrl, type, color });
                savePages();
                closeAddModal();
                renderSidebar();
                fetchNewsData();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fetchLimitSelect').value = fetchLimit;
            renderFilters();
            renderSidebar();
            
            if (Object.keys(cachedFeeds).length > 0) {
                processPosts(Object.values(cachedFeeds).flat());
            }
            fetchNewsData();
        });

    </script>
